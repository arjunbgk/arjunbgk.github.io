<body>
    <header>
        <nav>
            <ul>

        </nav>

    <main>
        <h1>Tourist Enquiry</h1>
        <p>Have questions about your upcoming trip? Ask us below!</p>
        
        <form class="enquiry-form" id="touristEnquiryForm">
            <div class="form-group">
                <label for="name">Your Name:</label>
                <input type="text" id="name" required placeholder="Enter your full name">
            </div>
            
            <div class="form-group">
                <label for="email">Email Address:</label>
                <input type="email" id="email" required placeholder="Enter your email">
            </div>

            <div class="form-group">
                <label for="destination">Destination of Interest:</label>
                <input type="text" id="destination" required placeholder="Where do you want to go?">
            </div>
            
            <div class="form-group">
                <label for="message">Your Question:</label>
                <textarea id="message" rows="5" required placeholder="What do you need help with?"></textarea>
            </div>
            
            <button type="submit">Submit Enquiry</button>
        </form>
    </main>

    <footer>
        <p>&copy; 2026 Travel Explorer. All Rights Reserved.</p>
    </footer>

    <script src="enquiry.js"></script>
</body>
</html>
