<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enquiry - Solapur</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Tourist Enquiry</h1>
    </header>
    
    <nav>
        <a href="index.html">Home</a>
        <a href="places.html">Places</a>
        <a href="culture.html">Culture</a>
        <a href="travel.html">Travel Guide</a>
        <a href="food.html">Food</a>
        <a href="gallery.html">Gallery</a>
        <a href="enquiry.html">Enquiry</a>
    </nav>

    <div class="container">
        <img src="images/tuljapur1.jpg" alt="Plan Your Trip" class="page-img">
        <h2>Ask for Tourist Information</h2>
        <p>Please fill out the form below and we will get back to you with the requested details about Solapur.</p>
        
        <form id="enquiryForm" class="enquiry-form">
            <input type="text" id="name" placeholder="Your Name" required>
            <input type="email" id="email" placeholder="Your Email Address" required>
            <textarea id="message" rows="5" placeholder="What information are you looking for?" required></textarea>
            <button type="submit">Send Enquiry</button>
        </form>
        
        <div id="formMessage" style="margin-top: 15px; font-weight: bold; color: green; display: none;"></div>
    </div>

    <footer>
        <p>&copy; 2026 Welcome to Solapur</p>
    </footer>

    <script src="enquiry.js"></script>
</body>
</html>
